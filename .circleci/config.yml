version: 2.1
orbs:
  architect: giantswarm/architect@8.0.0

workflows:
  all:
    jobs:
    - architect/go-build:
        matrix:
          parameters:
            architecture: ["linux/amd64", "linux/arm64"]
        binary: helloworld
        filters:
            # Trigger job also on git tag.
          tags:
            only: /^v.*/

    - architect/push-to-registries:
        context: architect
        name: push-to-registries
        image: giantswarm/helloworld
        multiarch: true
        requires:
        - architect/go-build
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore:
            - main
            - master
